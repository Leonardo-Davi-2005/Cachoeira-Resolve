<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - Prefeitura</title>
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>

    <div class="container">

        <img src="../img/logo_prefeitura.png" class="logo">

        <label>Nome completo</label>
        <input type="text">

        <label>E-mail</label>
        <input type="email" placeholder="Coloque seu e-mail">

        <label>Senha</label>
        <div class="senha-box">
            <input type="password" class="senha-input" placeholder="******">
            <span class="olho">👁</span>
        </div>

        <label>Confirmar senha</label>
        <div class="senha-box">
            <input type="password" class="senha-input" placeholder="******">
            <span class="olho">👁</span>
        </div>

        <div class="botoes">

            <button class="conta" onclick="window.location.href='../html/login.html'">
                Já tenho conta
            </button>

            <button class="criar">Criar conta</button>

        </div>

    </div>

    <script src="../js/password.js"></script>

</body>

</html>
