<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prefeitura de Cachoeira de Minas</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <div class="logo">
                <img src="../img/logo_prefeitura.png">
            </div>

            <form>

                <label>E-mail</label>
                <input id="email" type="email" placeholder="Coloque seu e-mail">

                <label>Senha</label>

                <div class="senha-box">

                    <input id="senha" type="password" class="senha-input" placeholder="Senha">
                    <span class="olho">👁</span>

                </div>

                <div class="botoes">
                    <button type="button" class="criar" onclick="window.location.href='register.html'">
                        Criar conta
                    </button>
                   <button type="button" class="entrar" onclick="entrar()">Entrar</button>
                </div>

            </form>

        </div>

    </div>

    <script src="../js/password.js"></script>
    <script src="../site/js/login.js"></script>


</body>

</html>
